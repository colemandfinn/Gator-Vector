<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GatorVector — Math Knowledge tests</title>
  <style>
    body { font: 14px/1.5 ui-monospace, Menlo, Consolas, monospace; margin: 2rem; }
    h1 { font-size: 1.1rem; }
    h2 { font-size: 0.95rem; margin: 1rem 0 0.25rem; }
    .case { padding: 2px 0; }
    .pass { color: #137333; }
    .fail { color: #c5221f; font-weight: bold; }
    .note { color: #5f6368; }
    #summary { margin-top: 1rem; font-weight: bold; }
    #summary.ok { color: #137333; }
    #summary.bad { color: #c5221f; }
  </style>
</head>
<body>
  <h1>Math Knowledge — tests (Phase 2, slice 1: clean-answer + linear cartridge)</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Zero tooling: load the source files directly, then run assertions below. -->
  <script src="src/mathKnowledge/cleanAnswer.js"></script>
  <script src="src/mathKnowledge/linearEquation.js"></script>
  <script src="src/mathKnowledge/area.js"></script>
  <script src="src/mathKnowledge/exponents.js"></script>
  <script src="src/mathKnowledge/engine.js"></script>
  <script src="src/mathKnowledge/registerCartridges.js"></script>
  <script>
    (function () {
      var MK = window.MathKnowledge;
      var clean = MK.cleanAnswer;
      var engine = MK.engine;

      // Item assembly was lifted out of the cartridges into the engine. The
      // cartridge assertion groups below still call `.buildItem(difficulty,
      // opts)`, so we route that through engine.buildItem via a thin per-cartridge
      // alias — which genuinely exercises the engine's assembly too. The alias
      // re-attaches the cartridge-specific display fields (equation/shape/subtype)
      // those groups reference, without putting them back on the real cartridge.
      function withEngineBuild(cart) {
        var o = Object.create(cart);
        o.buildItem = function (difficulty, opts) {
          var it = engine.buildItem(cart, difficulty, opts);
          it.equation = it.problem.equation;
          it.shape = it.problem.shape;
          it.subtype = it.problem.subtype;
          return it;
        };
        return o;
      }
      var linear = withEngineBuild(MK.linearEquation);
      var area = withEngineBuild(MK.area);
      var exponents = withEngineBuild(MK.exponents);

      var results = document.getElementById("results");
      var passed = 0, failed = 0;

      function row(ok, text) {
        passed += ok ? 1 : 0; failed += ok ? 0 : 1;
        var el = document.createElement("div");
        el.className = "case " + (ok ? "pass" : "fail");
        el.textContent = (ok ? "PASS" : "FAIL") + " — " + text;
        results.appendChild(el);
      }
      function check(description, actual, expected) {
        row(actual === expected,
          description + " (got " + actual + ", expected " + expected + ")");
      }
      function assert(description, ok) { row(!!ok, description); }
      function heading(text) {
        var el = document.createElement("h2");
        el.textContent = text;
        results.appendChild(el);
      }
      function note(text) {
        var el = document.createElement("div");
        el.className = "case note";
        el.textContent = text;
        results.appendChild(el);
      }

      // Seeded PRNG (mulberry32) so randomized tests are deterministic — no
      // flaky failures on the position-uniformity / spread sweeps.
      function mulberry32(seed) {
        return function () {
          seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
          var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
          t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      var LEVELS = ["easy", "medium", "hard"];

      // --- clean-answer machinery (§3, highest risk) ----------------------
      heading("clean-answer machinery (§3)");
      check("isCleanInteger(7) true", clean.isCleanInteger(7), true);
      check("isCleanInteger(-3) true", clean.isCleanInteger(-3), true);
      check("isCleanInteger(2.5) false", clean.isCleanInteger(2.5), false);
      check("isCleanInteger(NaN) false", clean.isCleanInteger(NaN), false);
      check("solveLinear(3,7,22) === 5", clean.solveLinear(3, 7, 22), 5);
      check("isExactlySolvable(3,7,22) true", clean.isExactlySolvable(3, 7, 22), true);
      check("isExactlySolvable(3,7,23) false", clean.isExactlySolvable(3, 7, 23), false);

      // Across many generated items per difficulty, EVERY correct answer must
      // be a clean integer, the construction must be exactly solvable, and the
      // canonical solve must recover x. A single ugly answer is the §3 defect.
      var rng = mulberry32(20260622);
      var CLEAN_N = 4000, cleanOk = 0, cleanFail = null;
      for (var i = 0; i < CLEAN_N; i++) {
        var lvl = LEVELS[i % 3];
        var p = linear.generate(lvl, { rng: rng });
        var problems = [];
        if (!clean.isCleanInteger(p.answer)) problems.push("answer not clean int: " + p.answer);
        if (p.a * p.x + p.b !== p.c) problems.push("c != a*x+b");
        if (!clean.isExactlySolvable(p.a, p.b, p.c)) problems.push("not exactly solvable");
        if (clean.solveLinear(p.a, p.b, p.c) !== p.answer) problems.push("solve != answer");
        if (Math.abs(p.a) < 2) problems.push("|a| < 2");
        if (p.x === 0 || p.b === 0) problems.push("x or b is zero");
        if (problems.length === 0) cleanOk++;
        else if (!cleanFail) cleanFail = "lvl " + lvl + ": " + problems.join("; ") +
          "  [a=" + p.a + " x=" + p.x + " b=" + p.b + " c=" + p.c + "]";
      }
      assert(cleanOk + "/" + CLEAN_N + " items: correct answer is a clean integer & exactly solvable" +
        (cleanFail ? " — first failure: " + cleanFail : ""), cleanOk === CLEAN_N);

      // --- distractors: count, uniqueness, real-pattern floor (§4.1) ------
      heading("distractors — count, uniqueness, >=2 real patterns (§4.1)");
      var rngD = mulberry32(424242);
      var DN = 4000, distOk = 0, distFail = null;
      for (var d = 0; d < DN; d++) {
        var lv = LEVELS[d % 3];
        var item = linear.buildItem(lv, { rng: rngD });
        var probs = [];

        if (item.options.length !== 5) probs.push("not 5 options");
        if (new Set(item.options).size !== 5) probs.push("options not all distinct");
        if (item.options[item.correctIndex] !== item.answer) probs.push("correctIndex wrong");

        var ds = item.optionMeta.filter(function (o) { return !o.correct; });
        if (ds.length !== 4) probs.push("not exactly 4 distractors");
        var errCount = ds.filter(function (o) { return o.kind === "error"; }).length;
        if (errCount < 2) probs.push("only " + errCount + " real error patterns");
        // every distractor distinct from the answer
        for (var z = 0; z < ds.length; z++) {
          if (ds[z].value === item.answer) { probs.push("distractor equals answer"); break; }
        }

        if (probs.length === 0) distOk++;
        else if (!distFail) distFail = "lvl " + lv + ": " + probs.join("; ") +
          "  [" + item.equation + " -> " + item.options.join(",") + "]";
      }
      assert(distOk + "/" + DN + " items: 5 distinct options, exactly 4 distractors, >=2 real patterns" +
        (distFail ? " — first failure: " + distFail : ""), distOk === DN);

      // --- all five options clean (§4.1.7, §3) ----------------------------
      // Not just the correct answer: every option — answer AND all four
      // distractors/fillers — must satisfy the §3 clean definition. A lone
      // ugly value can only be a wrong answer, so it is a structural tell.
      heading("clean options — all five, every item (§4.1.7)");
      var rngC = mulberry32(31251073);
      var CN = 6000, allCleanOk = 0, allCleanFail = null;
      for (var ci = 0; ci < CN; ci++) {
        var cit = linear.buildItem(LEVELS[ci % 3], { rng: rngC });
        var ugly = cit.options.filter(function (v) { return !clean.isCleanInteger(v); });
        if (ugly.length === 0) allCleanOk++;
        else if (!allCleanFail) allCleanFail = "lvl " + LEVELS[ci % 3] + ": ugly " + ugly.join(",") +
          "  [" + cit.equation + " -> " + cit.options.join(",") + "]";
      }
      assert(allCleanOk + "/" + CN + " items: all 5 options are clean integers (§3), not just the answer" +
        (allCleanFail ? " — first failure: " + allCleanFail : ""), allCleanOk === CN);

      // --- spread: no clustering tell (§4.1.3) ----------------------------
      // Fail an item if any single gap between sorted options exceeds 60% of the
      // total range — that is the signature of "tight cluster + one far option",
      // which would make the correct answer guessable by structure.
      heading("spread — no option is a clustering outlier (§4.1.3)");
      var rngS = mulberry32(99887766);
      var SN = 4000, spreadOk = 0, worstRatio = 0, spreadFail = null;
      for (var s = 0; s < SN; s++) {
        var lvS = LEVELS[s % 3];
        var it = linear.buildItem(lvS, { rng: rngS });
        var sorted = it.options.slice().sort(function (x, y) { return x - y; });
        var range = sorted[4] - sorted[0];
        var maxGap = 0;
        for (var g = 1; g < sorted.length; g++) {
          var gap = sorted[g] - sorted[g - 1];
          if (gap > maxGap) maxGap = gap;
        }
        var ratio = maxGap / range;
        if (ratio > worstRatio) worstRatio = ratio;
        if (ratio <= 0.6) spreadOk++;
        else if (!spreadFail) spreadFail = "lvl " + lvS + ": gap/range=" + ratio.toFixed(2) +
          "  [" + it.equation + " -> " + sorted.join(",") + "]";
      }
      assert(spreadOk + "/" + SN + " items: largest gap <= 60% of range" +
        (spreadFail ? " — first failure: " + spreadFail : ""), spreadOk === SN);
      note("worst observed gap/range ratio: " + worstRatio.toFixed(3) + " (threshold 0.60)");

      // --- position: correct answer roughly uniform across A-E (§4.1.5) ---
      heading("position — correct slot roughly uniform across A–E (§4.1.5)");
      var rngP = mulberry32(13572468);
      var PN = 6000;
      var buckets = [0, 0, 0, 0, 0];
      for (var pI = 0; pI < PN; pI++) {
        var pit = linear.buildItem(LEVELS[pI % 3], { rng: rngP });
        buckets[pit.correctIndex]++;
      }
      var expected = PN / 5;            // 1200 per slot
      var lowB = expected * 0.85, highB = expected * 1.15;  // +/-15% tolerance
      var posOk = buckets.every(function (n) { return n >= lowB && n <= highB; });
      assert("correct-slot counts within ±15% of " + expected + ": [" + buckets.join(", ") + "]", posOk);
      // Also: correct answer is not always the numeric extreme — it lands
      // mid-pack a healthy share of the time (§4.1.3 "mid-pack as often as edge").
      var rngM = mulberry32(8642097);
      var MN = 4000, midPack = 0;
      for (var mi = 0; mi < MN; mi++) {
        var mit = linear.buildItem(LEVELS[mi % 3], { rng: rngM });
        var srt = mit.options.slice().sort(function (x, y) { return x - y; });
        var rank = srt.indexOf(mit.answer);        // 0..4 by value
        if (rank !== 0 && rank !== 4) midPack++;    // not the min or max value
      }
      var midFrac = midPack / MN;
      assert("correct answer is a value-extreme < 70% of the time (mid-pack frac=" +
        midFrac.toFixed(2) + ")", midFrac >= 0.30);

      // --- determinism (§5.2) ---------------------------------------------
      heading("determinism (§5.2)");
      var a1 = linear.buildItem("medium", { rng: mulberry32(555) });
      var a2 = linear.buildItem("medium", { rng: mulberry32(555) });
      assert("same seed -> identical equation", a1.equation === a2.equation);
      assert("same seed -> identical options & correctIndex",
        a1.options.join(",") === a2.options.join(",") && a1.correctIndex === a2.correctIndex);
      // A problem's correct answer is stable: solving its equation reproduces it.
      var rngDet = mulberry32(31415);
      var detOk = 0, DET_N = 2000;
      for (var di = 0; di < DET_N; di++) {
        var dp = linear.generate(LEVELS[di % 3], { rng: rngDet });
        if (clean.solveLinear(dp.a, dp.b, dp.c) === dp.answer) detOk++;
      }
      check("solving each generated equation reproduces its answer", detOk, DET_N);

      // --- difficulty knob respects ranges (§5.1, F-1 default) ------------
      heading("difficulty knob — generate(difficulty) controls ranges (§5.1)");
      var rngK = mulberry32(246810);
      var KN = 2000;
      function rangeOk(level) {
        var R = linear.RANGES[level];
        for (var ki = 0; ki < KN; ki++) {
          var kp = linear.generate(level, { rng: rngK });
          var am = Math.abs(kp.a), xm = Math.abs(kp.x), bm = Math.abs(kp.b);
          if (am < R.a[0] || am > R.a[1]) return "a magnitude " + kp.a;
          if (xm < R.x[0] || xm > R.x[1]) return "x magnitude " + kp.x;
          if (bm < R.b[0] || bm > R.b[1]) return "b magnitude " + kp.b;
          if (!R.aNeg && kp.a < 0) return "negative a at " + level;
          if (!R.xNeg && kp.x < 0) return "negative x at " + level;
          if (!R.bNeg && kp.b < 0) return "negative b at " + level;
        }
        return null;
      }
      LEVELS.forEach(function (level) {
        var bad = rangeOk(level);
        assert("'" + level + "': all of a,x,b within declared ranges/signs" +
          (bad ? " — violation: " + bad : ""), bad === null);
      });
      check("unknown difficulty falls back to easy",
        linear.generate("bogus", { rng: mulberry32(1) }).difficulty, "easy");
      note("FLAG F-1 (§5.1/§7): difficulty→range mapping is an UNVALIDATED default, " +
        "pending cadet-tester feedback — the knob is real, the numbers are provisional.");

      // --- concrete spot-check, printed for human eyeballing --------------
      heading("concrete sample items (eyeball check — F-2 realism pending)");
      var rngEx = mulberry32(7);
      ["easy", "medium", "hard"].forEach(function (level) {
        var ex = linear.buildItem(level, { rng: rngEx });
        var tags = ex.optionMeta.map(function (o) {
          return o.value + (o.correct ? "✓" : "[" + (o.kind === "error" ? o.pattern : "filler") + "]");
        });
        note(level + ":  " + ex.equation + "   options → " + tags.join("  "));
      });

      // ================================================================
      //  AREA CARTRIDGE (rectangle & circle) — same assertion groups
      //  π convention is 22/7 with radius = 7k (F-4), so every value is an
      //  exact clean integer. Rectangle is the §4.1.1 floor stress test.
      // ================================================================
      var AREA_LEVELS = ["easy", "medium", "hard"];
      var AREA_SHAPES = ["rectangle", "circle"];

      // --- clean answers (§3): every correct area is a positive clean int ---
      heading("AREA — clean answers, every item (§3)");
      var aRng = mulberry32(50607080);
      var ACN = 6000, aCleanOk = 0, aCleanFail = null;
      for (var ai = 0; ai < ACN; ai++) {
        var ap = area.generate(AREA_LEVELS[ai % 3], { rng: aRng });
        var aok = clean.isCleanInteger(ap.answer) && ap.answer > 0;
        // independently re-derive the area to confirm the construction is clean
        if (aok && ap.shape === "rectangle") aok = (ap.answer === ap.L * ap.W);
        if (aok && ap.shape === "circle") aok = (ap.answer === 154 * ap.k * ap.k); // (22/7)(7k)^2
        if (aok) aCleanOk++;
        else if (!aCleanFail) aCleanFail = ap.shape + " answer=" + ap.answer;
      }
      assert(aCleanOk + "/" + ACN + " items: correct area is a positive clean integer, exactly derived" +
        (aCleanFail ? " — first failure: " + aCleanFail : ""), aCleanOk === ACN);

      // --- all five options clean (§4.1.7) --------------------------------
      heading("AREA — all five options clean, every item (§4.1.7)");
      var aRng2 = mulberry32(11223344);
      var AAN = 6000, aAllOk = 0, aAllFail = null;
      for (var aj = 0; aj < AAN; aj++) {
        var ait = area.buildItem(AREA_LEVELS[aj % 3], { rng: aRng2 });
        var uglyA = ait.options.filter(function (v) { return !clean.isCleanInteger(v); });
        if (uglyA.length === 0) aAllOk++;
        else if (!aAllFail) aAllFail = ait.shape + ": ugly " + uglyA.join(",") + " [" + ait.options.join(",") + "]";
      }
      assert(aAllOk + "/" + AAN + " items: all 5 options are clean integers (§4.1.7)" +
        (aAllFail ? " — first failure: " + aAllFail : ""), aAllOk === AAN);

      // --- distractor count/uniqueness + >=2 real patterns (§4.1.1/§4.1.6) -
      // Rectangle is the cartridge that justifies the floor being 2: it has only
      // ~2 rock-solid mistakes, so this proves it clears 2 honestly. Circle
      // clears 3. Both are exercised explicitly via forced shapes.
      heading("AREA — 4 distinct distractors, >=2 real patterns (§4.1.1, §4.1.6)");
      var aRng3 = mulberry32(95135790);
      var ADN = 6000, aDistOk = 0, aDistFail = null;
      var rectMin = 99, circMin = 99; // track the worst real-pattern count seen per shape
      for (var ak = 0; ak < ADN; ak++) {
        var shape = AREA_SHAPES[ak % 2];
        var dit = area.buildItem(AREA_LEVELS[ak % 3], { rng: aRng3, shape: shape });
        var probs = [];
        if (dit.options.length !== 5) probs.push("not 5 options");
        if (new Set(dit.options).size !== 5) probs.push("options not distinct");
        if (dit.options[dit.correctIndex] !== dit.answer) probs.push("correctIndex wrong");
        var ds = dit.optionMeta.filter(function (o) { return !o.correct; });
        if (ds.length !== 4) probs.push("not exactly 4 distractors");
        var errCount = ds.filter(function (o) { return o.kind === "error"; }).length;
        if (errCount < 2) probs.push("only " + errCount + " real patterns");
        if (shape === "rectangle" && errCount < rectMin) rectMin = errCount;
        if (shape === "circle" && errCount < circMin) circMin = errCount;
        if (probs.length === 0) aDistOk++;
        else if (!aDistFail) aDistFail = shape + ": " + probs.join("; ") + " [" + dit.options.join(",") + "]";
      }
      assert(aDistOk + "/" + ADN + " items: 5 distinct options, exactly 4 distractors, >=2 real patterns" +
        (aDistFail ? " — first failure: " + aDistFail : ""), aDistOk === ADN);
      assert("rectangle clears the floor honestly (min real patterns seen = " + rectMin + ", floor 2)", rectMin >= 2);
      note("circle min real patterns seen = " + circMin + " (clears 3 comfortably)");

      // --- spread: no clustering tell (§4.1.3), checked per shape ----------
      heading("AREA — no clustering outlier (§4.1.3)");
      AREA_SHAPES.forEach(function (shape, si) {
        var sRng = mulberry32(60708090 + si);
        var ASN = 4000, aSpreadOk = 0, aWorst = 0, aSpreadFail = null;
        for (var sj = 0; sj < ASN; sj++) {
          var sit = area.buildItem(AREA_LEVELS[sj % 3], { rng: sRng, shape: shape });
          var sorted = sit.options.slice().sort(function (x, y) { return x - y; });
          var range = sorted[4] - sorted[0];
          var maxGap = 0;
          for (var g = 1; g < 5; g++) { var gap = sorted[g] - sorted[g - 1]; if (gap > maxGap) maxGap = gap; }
          var ratio = maxGap / range;
          if (ratio > aWorst) aWorst = ratio;
          if (ratio <= 0.6) aSpreadOk++;
          else if (!aSpreadFail) aSpreadFail = shape + ": gap/range=" + ratio.toFixed(2) + " [" + sorted.join(",") + "]";
        }
        assert(shape + ": " + aSpreadOk + "/" + ASN + " items have largest gap <= 60% of range" +
          (aSpreadFail ? " — first failure: " + aSpreadFail : ""), aSpreadOk === ASN);
        note(shape + " worst gap/range ratio: " + aWorst.toFixed(3) + " (threshold 0.60)");
      });

      // --- position: correct slot roughly uniform across A-E (§4.1.5) -----
      heading("AREA — correct slot roughly uniform across A–E (§4.1.5)");
      var aRngP = mulberry32(24681357);
      var APN = 6000, aBuckets = [0, 0, 0, 0, 0];
      for (var apI = 0; apI < APN; apI++) {
        var apit = area.buildItem(AREA_LEVELS[apI % 3], { rng: aRngP });
        aBuckets[apit.correctIndex]++;
      }
      var aExpected = APN / 5;
      var aPosOk = aBuckets.every(function (n) { return n >= aExpected * 0.85 && n <= aExpected * 1.15; });
      assert("correct-slot counts within ±15% of " + aExpected + ": [" + aBuckets.join(", ") + "]", aPosOk);

      // --- concrete area samples, printed for eyeballing (F-2/F-4 pending) --
      heading("AREA — concrete sample items (eyeball check)");
      var aRngEx = mulberry32(31);
      AREA_SHAPES.forEach(function (shape) {
        ["easy", "hard"].forEach(function (level) {
          var ex2 = area.buildItem(level, { rng: aRngEx, shape: shape });
          var tags2 = ex2.optionMeta.map(function (o) {
            return o.value + (o.correct ? "✓" : "[" + (o.kind === "error" ? o.pattern : "filler") + "]");
          });
          note(shape + "/" + level + ":  " + ex2.prompt + "   options → " + tags2.join("  "));
        });
      });
      note("FLAG F-4 (§4.2/§7): circle π convention = 22/7 with radius = 7k, chosen so every " +
        "option is an exact clean integer; realism still pending cadet-tester validation (F-2).");

      // ================================================================
      //  EXPONENT CARTRIDGE — same assertion groups
      //  The clean-integer trap: negative exponents are excluded entirely
      //  (they give fractions), zero exponents allowed (a^0 = 1), and every
      //  item evaluates to an integer power a^E within a difficulty cap.
      // ================================================================
      var EXP_LEVELS = ["easy", "medium", "hard"];
      var EXP_SUBTYPES = ["product", "power", "zero"];

      // --- clean answers (§3): every correct value is a positive clean int --
      heading("EXPONENTS — clean answers, every item (§3)");
      var eRng = mulberry32(70809010);
      var ECN = 9000, eCleanOk = 0, eCleanFail = null;
      for (var ei = 0; ei < ECN; ei++) {
        var ep = exponents.generate(EXP_LEVELS[ei % 3], { rng: eRng });
        if (clean.isCleanInteger(ep.answer) && ep.answer >= 1) eCleanOk++;
        else if (!eCleanFail) eCleanFail = ep.subtype + " answer=" + ep.answer;
      }
      assert(eCleanOk + "/" + ECN + " items: correct value is a positive clean integer" +
        (eCleanFail ? " — first failure: " + eCleanFail : ""), eCleanOk === ECN);

      // --- all five options clean (§4.1.7) --------------------------------
      heading("EXPONENTS — all five options clean, every item (§4.1.7)");
      var eRng2 = mulberry32(13243546);
      var EAN = 9000, eAllOk = 0, eAllFail = null;
      for (var ej = 0; ej < EAN; ej++) {
        var eit = exponents.buildItem(EXP_LEVELS[ej % 3], { rng: eRng2 });
        var uglyE = eit.options.filter(function (v) { return !clean.isCleanInteger(v); });
        if (uglyE.length === 0) eAllOk++;
        else if (!eAllFail) eAllFail = eit.subtype + ": ugly " + uglyE.join(",") + " [" + eit.options.join(",") + "]";
      }
      assert(eAllOk + "/" + EAN + " items: all 5 options are clean integers (§4.1.7)" +
        (eAllFail ? " — first failure: " + eAllFail : ""), eAllOk === EAN);

      // --- 4 distinct distractors + >=2 real patterns (§4.1.1/§4.1.6) ------
      // All three sub-types forced so each is shown to clear the floor of 2.
      heading("EXPONENTS — 4 distinct distractors, >=2 real patterns (§4.1.1, §4.1.6)");
      var eRng3 = mulberry32(86429753);
      var EDN = 9000, eDistOk = 0, eDistFail = null;
      var subMin = { product: 99, power: 99, zero: 99 };
      for (var ek = 0; ek < EDN; ek++) {
        var sub = EXP_SUBTYPES[ek % 3];
        var edit = exponents.buildItem(EXP_LEVELS[ek % 3], { rng: eRng3, subtype: sub });
        var probs = [];
        if (edit.options.length !== 5) probs.push("not 5 options");
        if (new Set(edit.options).size !== 5) probs.push("options not distinct");
        if (edit.options[edit.correctIndex] !== edit.answer) probs.push("correctIndex wrong");
        var ds = edit.optionMeta.filter(function (o) { return !o.correct; });
        if (ds.length !== 4) probs.push("not exactly 4 distractors");
        var errCount = ds.filter(function (o) { return o.kind === "error"; }).length;
        if (errCount < 2) probs.push("only " + errCount + " real patterns");
        if (errCount < subMin[sub]) subMin[sub] = errCount;
        if (probs.length === 0) eDistOk++;
        else if (!eDistFail) eDistFail = sub + ": " + probs.join("; ") + " [" + edit.prompt + " -> " + edit.options.join(",") + "]";
      }
      assert(eDistOk + "/" + EDN + " items: 5 distinct options, exactly 4 distractors, >=2 real patterns" +
        (eDistFail ? " — first failure: " + eDistFail : ""), eDistOk === EDN);
      assert("every sub-type clears the floor (min real patterns — product:" + subMin.product +
        " power:" + subMin.power + " zero:" + subMin.zero + ", floor 2)",
        subMin.product >= 2 && subMin.power >= 2 && subMin.zero >= 2);

      // --- spread: no clustering tell (§4.1.3), per sub-type --------------
      heading("EXPONENTS — no clustering outlier (§4.1.3)");
      EXP_SUBTYPES.forEach(function (sub, si) {
        var sRng = mulberry32(40506070 + si);
        var ESN = 4000, eSpreadOk = 0, eWorst = 0, eSpreadFail = null;
        for (var sj = 0; sj < ESN; sj++) {
          var sit = exponents.buildItem(EXP_LEVELS[sj % 3], { rng: sRng, subtype: sub });
          var sorted = sit.options.slice().sort(function (x, y) { return x - y; });
          var range = sorted[4] - sorted[0];
          var maxGap = 0;
          for (var g = 1; g < 5; g++) { var gap = sorted[g] - sorted[g - 1]; if (gap > maxGap) maxGap = gap; }
          var ratio = maxGap / range;
          if (ratio > eWorst) eWorst = ratio;
          if (ratio <= 0.6) eSpreadOk++;
          else if (!eSpreadFail) eSpreadFail = sub + ": gap/range=" + ratio.toFixed(2) + " [" + sorted.join(",") + "]";
        }
        assert(sub + ": " + eSpreadOk + "/" + ESN + " items have largest gap <= 60% of range" +
          (eSpreadFail ? " — first failure: " + eSpreadFail : ""), eSpreadOk === ESN);
        note(sub + " worst gap/range ratio: " + eWorst.toFixed(3) + " (threshold 0.60)");
      });

      // --- position: correct slot roughly uniform across A-E (§4.1.5) -----
      heading("EXPONENTS — correct slot roughly uniform across A–E (§4.1.5)");
      var eRngP = mulberry32(35797531);
      var EPN = 9000, eBuckets = [0, 0, 0, 0, 0];
      for (var epI = 0; epI < EPN; epI++) {
        var epit = exponents.buildItem(EXP_LEVELS[epI % 3], { rng: eRngP });
        eBuckets[epit.correctIndex]++;
      }
      var eExpected = EPN / 5;
      var ePosOk = eBuckets.every(function (n) { return n >= eExpected * 0.85 && n <= eExpected * 1.15; });
      assert("correct-slot counts within ±15% of " + eExpected + ": [" + eBuckets.join(", ") + "]", ePosOk);

      // --- concrete exponent samples, printed for eyeballing --------------
      heading("EXPONENTS — concrete sample items (eyeball check)");
      var eRngEx = mulberry32(59);
      EXP_SUBTYPES.forEach(function (sub) {
        ["easy", "hard"].forEach(function (level) {
          var ex3 = exponents.buildItem(level, { rng: eRngEx, subtype: sub });
          var tags3 = ex3.optionMeta.map(function (o) {
            return o.value + (o.correct ? "✓" : "[" + (o.kind === "error" ? o.pattern : "filler") + "]");
          });
          note(sub + "/" + level + ":  " + ex3.prompt + " = " + ex3.answer + "   options → " + tags3.join("  "));
        });
      });
      note("Negative exponents are excluded by design: a^(-n) = 1/a^n is a fraction, which would " +
        "violate §4.1.7. Zero exponents allowed (a^0 = 1, integer). Range mapping flagged F-1.");

      // ================================================================
      //  ENGINE + REGISTRY (§2) — routing, assembly, interleaving, scoring
      // ================================================================
      heading("ENGINE — registry routes the three cartridges (§2.1/§2.2)");
      assert("registry holds all 3 cartridges: " + engine.cartridges().map(function (c) { return c.id; }).join(", "),
        engine.cartridges().length === 3);
      assert("byId resolves linear/area/exponents and rejects unknown",
        !!engine.byId("linear") && !!engine.byId("area") && !!engine.byId("exponents") && !engine.byId("nope"));

      heading("ENGINE — buildItem assembles valid clean items for every cartridge");
      var enRng = mulberry32(192837465);
      var ENB = 6000, enOk = 0, enFail = null;
      var realCarts = [MK.linearEquation, MK.area, MK.exponents];
      for (var bi = 0; bi < ENB; bi++) {
        var cart = realCarts[bi % 3];
        var it = engine.buildItem(cart, ["easy", "medium", "hard"][bi % 3], { rng: enRng });
        var probs = [];
        if (it.cartridge !== cart.id) probs.push("wrong cartridge id");
        if (it.options.length !== 5 || new Set(it.options).size !== 5) probs.push("not 5 distinct options");
        if (it.options[it.correctIndex] !== it.answer) probs.push("correctIndex wrong");
        if (!it.options.every(function (v) { return clean.isCleanInteger(v); })) probs.push("unclean option");
        if (!it.prompt || it.prompt.length < 3) probs.push("missing prompt");
        if (!it.explain || it.explain.length < 5) probs.push("missing explanation");
        if (probs.length === 0) enOk++;
        else if (!enFail) enFail = cart.id + ": " + probs.join("; ");
      }
      assert(enOk + "/" + ENB + " engine items: right cartridge, 5 clean distinct options, prompt + method present" +
        (enFail ? " — first failure: " + enFail : ""), enOk === ENB);

      heading("ENGINE — drill is interleaved, 25 items, all 3 types (spec intent)");
      var drRng = mulberry32(564738291);
      var DRILLS = 300, drillOk = 0, drillFail = null;
      var typeTotals = { linear: 0, area: 0, exponents: 0 };
      for (var di = 0; di < DRILLS; di++) {
        var dr = engine.generateDrill({ rng: drRng });
        var probs2 = [];
        if (dr.items.length !== 25) probs2.push("count " + dr.items.length);
        var types = {};
        dr.items.forEach(function (x) { types[x.cartridge] = (types[x.cartridge] || 0) + 1; typeTotals[x.cartridge]++; });
        if (Object.keys(types).length !== 3) probs2.push("missing a type");
        var run = 1, maxRun = 1;
        for (var i = 1; i < dr.items.length; i++) {
          if (dr.items[i].cartridge === dr.items[i - 1].cartridge) { run++; if (run > maxRun) maxRun = run; }
          else run = 1;
        }
        if (maxRun > 2) probs2.push("run of " + maxRun);          // round-robin caps runs at 2
        if (probs2.length === 0) drillOk++;
        else if (!drillFail) drillFail = probs2.join("; ");
      }
      assert(drillOk + "/" + DRILLS + " drills: 25 items, all 3 types present, no run of one type > 2" +
        (drillFail ? " — first failure: " + drillFail : ""), drillOk === DRILLS);
      note("type balance over " + DRILLS + " drills: " + JSON.stringify(typeTotals) + " (round-robin keeps them even)");

      heading("ENGINE — scoring & review (no guessing penalty)");
      var sItems = [
        { correctIndex: 0, options: [10, 20, 30, 40, 50], prompt: "p1", explain: "e1" },
        { correctIndex: 2, options: [1, 2, 3, 4, 5], prompt: "p2", explain: "e2" },
        { correctIndex: 4, options: [5, 6, 7, 8, 9], prompt: "p3", explain: "e3" },
      ];
      check("scoreDrill counts a right/wrong mix (2 of 3)", engine.scoreDrill(sItems, [0, 1, 4]), 2);
      check("scoreDrill all-blank is 0 (no penalty)", engine.scoreDrill(sItems, [null, null, null]), 0);
      var rev = engine.reviewMissed(sItems, [0, 1, null]);
      assert("reviewMissed lists the 2 wrong with chosen/correct/method",
        rev.length === 2 && rev[0].number === 2 && rev[0].chosen === 2 && rev[0].correct === 3 &&
        rev[0].explain === "e2" && rev[1].chosen === null && rev[1].correct === 9);

      heading("ENGINE — practice nextItem never repeats the exact prompt back-to-back");
      var niRng = mulberry32(101010101);
      var prev = null, reps = 0;
      for (var ni = 0; ni < 3000; ni++) {
        var nit = engine.nextItem(prev, { rng: niRng });
        if (prev && nit.prompt === prev.prompt) reps++;
        prev = nit;
      }
      assert("0 exact back-to-back repeats over 3000 practice draws (got " + reps + ")", reps === 0);

      var summary = document.getElementById("summary");
      summary.className = failed === 0 ? "ok" : "bad";
      summary.textContent =
        failed === 0
          ? "ALL PASS — " + passed + "/" + (passed + failed)
          : failed + " FAILED — " + passed + "/" + (passed + failed) + " passed";
    })();
  </script>
</body>
</html>
