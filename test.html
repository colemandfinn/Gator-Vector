<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GatorVector — Table Reading tests</title>
  <style>
    body { font: 14px/1.5 ui-monospace, Menlo, Consolas, monospace; margin: 2rem; }
    h1 { font-size: 1.1rem; }
    .case { padding: 2px 0; }
    .pass { color: #137333; }
    .fail { color: #c5221f; font-weight: bold; }
    #summary { margin-top: 1rem; font-weight: bold; }
    #summary.ok { color: #137333; }
    #summary.bad { color: #c5221f; }
  </style>
</head>
<body>
  <h1>Table Reading — tests</h1>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- Zero tooling: load the source files directly, then run assertions below. -->
  <script src="src/tableReading/labelIndex.js"></script>
  <script src="src/tableReading/gridGenerator.js"></script>
  <script src="src/tableReading/itemGenerator.js"></script>
  <script src="src/tableReading/drill.js"></script>
  <script src="src/tableReading/scoring.js"></script>
  <script>
    (function () {
      var labelToIndex = window.TableReading.labelToIndex;
      var indexToLabel = window.TableReading.indexToLabel;
      var generateGrid = window.TableReading.generateGrid;
      var lookup = window.TableReading.lookup;
      var generateItem = window.TableReading.generateItem;
      var generateDrill = window.TableReading.generateDrill;
      var scoreDrill = window.TableReading.scoreDrill;

      var results = document.getElementById("results");
      var passed = 0, failed = 0;

      function row(ok, text) {
        passed += ok ? 1 : 0; failed += ok ? 0 : 1;
        var el = document.createElement("div");
        el.className = "case " + (ok ? "pass" : "fail");
        el.textContent = (ok ? "PASS" : "FAIL") + " — " + text;
        results.appendChild(el);
      }

      function check(description, actual, expected) {
        row(actual === expected,
          description + " (got " + actual + ", expected " + expected + ")");
      }

      function assert(description, ok) {
        row(!!ok, description);
      }

      function heading(text) {
        var el = document.createElement("h2");
        el.style.cssText = "font-size:0.95rem;margin:1rem 0 0.25rem;";
        el.textContent = text;
        results.appendChild(el);
      }

      // --- label<->index corner cases (spec: index = label + 17) ----------
      heading("label↔index corner cases");
      check("labelToIndex(-17) === 0", labelToIndex(-17), 0);
      check("labelToIndex(0) === 17",  labelToIndex(0), 17);
      check("labelToIndex(17) === 34", labelToIndex(17), 34);

      // indexToLabel — reverse direction
      check("indexToLabel(0) === -17", indexToLabel(0), -17);
      check("indexToLabel(17) === 0",  indexToLabel(17), 0);
      check("indexToLabel(34) === 17", indexToLabel(34), 17);

      // --- grid generator -------------------------------------------------
      heading("grid generator");
      var grid = generateGrid(); // defaults: axisRange 17, cellValueRange [0,99]

      // 35x35: outer length 35, and every row also length 35.
      var allRowsAre35 = grid.cells.every(function (r) { return r.length === 35; });
      check("grid has 35 rows", grid.cells.length, 35);
      assert("every row has 35 columns", allRowsAre35);

      // Every cell value is an integer within [0, 99].
      var allInRange = true, offending = null;
      for (var r = 0; r < grid.cells.length; r++) {
        for (var c = 0; c < grid.cells[r].length; c++) {
          var v = grid.cells[r][c];
          if (!Number.isInteger(v) || v < 0 || v > 99) {
            allInRange = false; offending = v; break;
          }
        }
        if (!allInRange) break;
      }
      assert("every cell is an integer in [0, 99]" +
        (allInRange ? "" : " (found " + offending + ")"), allInRange);

      // Known (X, Y) lookup returns the same value the grid holds at that cell.
      // X = column, Y = row, so label (X,Y) -> cells[yIndex][xIndex].
      var X = 5, Y = -3;
      var xIndex = labelToIndex(X), yIndex = labelToIndex(Y);
      check("lookup(grid, 5, -3) matches cells[yIndex][xIndex]",
        lookup(grid, X, Y), grid.cells[yIndex][xIndex]);

      // Corner lookup too (label (-17,-17) -> cells[0][0]).
      check("lookup(grid, -17, -17) matches cells[0][0]",
        lookup(grid, -17, -17), grid.cells[0][0]);

      // --- item generator -------------------------------------------------
      heading("item generator");

      // Invariants that must hold for EVERY item. Run many to exercise random
      // targets including edges/corners (where ring-widening kicks in).
      function itemInvariants(item) {
        var fails = [];
        if (item.options.length !== 5) fails.push("not 5 options (" + item.options.length + ")");
        if (new Set(item.options).size !== 5) fails.push("options not all unique");
        var correct = lookup(grid, item.x, item.y);
        if (item.options.indexOf(correct) === -1) fails.push("correct answer missing");
        if (item.options[item.correctIndex] !== correct) fails.push("correctIndex wrong");
        for (var i = 1; i < item.options.length; i++) {
          if (item.options[i - 1] >= item.options[i]) { fails.push("not ascending"); break; }
        }
        return fails;
      }

      var N = 500, firstFail = null, okCount = 0;
      for (var t = 0; t < N; t++) {
        var f = itemInvariants(generateItem(grid));
        if (f.length === 0) okCount++;
        else if (!firstFail) firstFail = f.join("; ");
      }
      assert(okCount + "/" + N + " random items: 5 unique options, correct present, ascending" +
        (firstFail ? " — first failure: " + firstFail : ""), okCount === N);

      // Spot-check one item explicitly so the proof is concrete and readable.
      var item = generateItem(grid, { x: 5, y: -3 });
      check("item has exactly 5 options", item.options.length, 5);
      assert("options all unique", new Set(item.options).size === 5);
      assert("correct answer is among options",
        item.options.indexOf(lookup(grid, 5, -3)) !== -1);
      assert("options sorted ascending",
        item.options.every(function (v, i) { return i === 0 || item.options[i - 1] < v; }));

      // Corner target (-17,-17) — only 3 distance-1 neighbors exist, so this
      // forces ring-widening; still must yield 5 unique ascending options.
      var corner = generateItem(grid, { x: -17, y: -17 });
      assert("corner item still 5 unique ascending options",
        corner.options.length === 5 &&
        new Set(corner.options).size === 5 &&
        corner.options.every(function (v, i) { return i === 0 || corner.options[i - 1] < v; }));

      // --- drill loop -----------------------------------------------------
      heading("drill loop");

      function isValidItem(item) {
        if (item.options.length !== 5) return false;
        if (new Set(item.options).size !== 5) return false;
        var correct = lookup(grid, item.x, item.y);
        if (item.options.indexOf(correct) === -1) return false;
        if (item.options[item.correctIndex] !== correct) return false;
        for (var i = 1; i < 5; i++) if (item.options[i - 1] >= item.options[i]) return false;
        return true;
      }

      // Run many drills so the "no back-to-back duplicate" rule is exercised
      // across thousands of consecutive-item boundaries, not just one drill.
      var DRILLS = 50, drillsOk = 0, drillFail = null;
      for (var d = 0; d < DRILLS; d++) {
        var drill = generateDrill(grid); // default itemCount 40
        var problems = [];
        if (drill.items.length !== 40) problems.push("count " + drill.items.length);
        for (var i = 1; i < drill.items.length; i++) {
          var a = drill.items[i - 1], b = drill.items[i];
          if (a.x === b.x && a.y === b.y) { problems.push("dup coord at " + i); break; }
        }
        for (var j = 0; j < drill.items.length; j++) {
          if (!isValidItem(drill.items[j])) { problems.push("bad item at " + j); break; }
        }
        if (problems.length === 0) drillsOk++;
        else if (!drillFail) drillFail = problems.join("; ");
      }
      assert(drillsOk + "/" + DRILLS + " drills: 40 items, no back-to-back dup coords, all items valid" +
        (drillFail ? " — first failure: " + drillFail : ""), drillsOk === DRILLS);

      // Concrete single-drill spot checks.
      var oneDrill = generateDrill(grid);
      check("drill produces exactly 40 items", oneDrill.items.length, 40);
      var noDup = true;
      for (var k = 1; k < oneDrill.items.length; k++) {
        var p = oneDrill.items[k - 1], c = oneDrill.items[k];
        if (p.x === c.x && p.y === c.y) { noDup = false; break; }
      }
      assert("no two consecutive items share (X,Y)", noDup);
      assert("every drill item has 5 unique ascending options with correct present",
        oneDrill.items.every(isValidItem));

      // --- scoring --------------------------------------------------------
      heading("scoring");

      // Known mix: a fabricated item list with explicit correctIndex values and
      // a hand-picked answer array (answer = chosen option index, null = blank).
      var scoringItems = [
        { x: 1,  y: 1,  correctIndex: 0 }, // answer 0 -> correct
        { x: 2,  y: 2,  correctIndex: 2 }, // answer 2 -> correct
        { x: 3,  y: 3,  correctIndex: 1 }, // answer 3 -> WRONG
        { x: 4,  y: 4,  correctIndex: 4 }, // answer null -> WRONG (unanswered)
        { x: 5,  y: 5,  correctIndex: 3 }, // answer 3 -> correct
      ];
      var answers = [0, 2, 3, null, 3];
      check("scoreDrill counts a known right/wrong mix (3 of 5)",
        scoreDrill(scoringItems, answers), 3);
      check("scoreDrill all-correct", scoreDrill(scoringItems, [0, 2, 1, 4, 3]), 5);
      check("scoreDrill all-blank (no guessing penalty, just 0)",
        scoreDrill(scoringItems, [null, null, null, null, null]), 0);
      check("scoreDrill with missing answers array treats all as wrong",
        scoreDrill(scoringItems, []), 0);

      var summary = document.getElementById("summary");
      summary.className = failed === 0 ? "ok" : "bad";
      summary.textContent =
        failed === 0
          ? "ALL PASS — " + passed + "/" + (passed + failed)
          : failed + " FAILED — " + passed + "/" + (passed + failed) + " passed";
    })();
  </script>
</body>
</html>
